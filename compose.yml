services:
  icloud-hme:
    build:
      context: .
      dockerfile: Dockerfile
    image: icloud-hme:local
    container_name: icloud-hme
    restart: unless-stopped
    init: true
    environment:
      API_KEY: "${API_KEY:?请在 .env 中配置 API_KEY}"
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${HOST_PORT:-8081}:8081"
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
